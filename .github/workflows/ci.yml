name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Root Dependencies
        run: npm install

      - name: Root Lint
        run: npm run lint

      - name: Root Type-check
        run: npm run type-check

      - name: Root Audit
        run: npm audit --audit-level=high

      - name: Frontend Tests
        run: npx vitest run

      - name: Install Server Dependencies
        run: npm install
        working-directory: server

      - name: Server Type-check
        run: npm run build
        working-directory: server

      - name: Server Audit
        run: npm audit --audit-level=high
        working-directory: server

  golang:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: agent/go.sum

      - name: Go Mod Tidy Check
        run: |
          go mod tidy
          git diff --exit-code
        working-directory: agent

      - name: Go Build
        run: go build ./...
        working-directory: agent

      - name: Go Test
        run: go test -v ./...
        working-directory: agent

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64
          working-directory: agent

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Go Vulncheck
        run: govulncheck ./...
        working-directory: agent

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - name: Check Formatting
        run: cargo fmt -- --check
        working-directory: src-tauri
      - name: Clippy
        run: cargo clippy -- -D warnings
        working-directory: src-tauri
      - name: Build
        run: cargo build --verbose
        working-directory: src-tauri
      - name: Test
        run: cargo test --verbose
        working-directory: src-tauri
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Cargo Audit
        run: cargo audit --ignore RUSTSEC-2026-0194 --ignore RUSTSEC-2026-0195 --ignore RUSTSEC-2026-0185 --ignore RUSTSEC-2024-0429 --ignore RUSTSEC-2026-0190
        working-directory: src-tauri
